<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SocialFeed{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/" class="nav-logo">⚡ SocialFeed</a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
        🏠 Home
      </a>
      <a href="/feed" class="nav-link {% if request.path == '/feed' %}active{% endif %}">
        🏠 Posts
      </a>
      <a href="/trending" class="nav-link {% if request.path == '/trending' %}active{% endif %}">
        🔥 Trending
      </a>
      <a href="/users" class="nav-link {% if request.path == '/users' %}active{% endif %}">
        👥 Users
      </a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-container">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Built with Flask + MongoDB ⚡</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
